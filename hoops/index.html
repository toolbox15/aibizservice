<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Project SXC — Swipe to Shoot V7</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #root { width: 100%; height: 100dvh; position: relative; }

    /* ── Game layers ── */
    .layer { position: absolute; inset: 0; display: block; }

    #stadium-bg {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      filter: blur(10px) brightness(0.28) saturate(0.6);
      transform: scale(1.06);
      pointer-events: none; z-index: 1;
    }

    /* Court floor — FIXED: No more 3D stretching */
    #court-floor {
      position: absolute;
      left: 0; right: 0;
      top: 45%; bottom: 0;
      pointer-events: none;
      z-index: 3;
    }
    #court-floor-img {
      position: absolute; inset: 0;
      background-image: url('./court_floor.png');
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
    }
    #floor-fade-near {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.55) 100%);
    }

    /* ── HUD ── */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10; pointer-events: none;
    }
    .brand-bar {
      background: rgba(0,0,0,0.90);
      display: flex; align-items: center; justify-content: center; padding: 6px 16px;
    }
    .brand-bar span { font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: #888; }
    .stat-row { display: flex; background: rgba(0,0,0,0.8); border-bottom: 2px solid #CE1141; }
    .stat-card { flex: 1; padding: 8px 16px; display: flex; flex-direction: column; align-items: center; }
    .stat-label { font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: #fff; }
    .stat-value { font-size: 32px; font-weight: 900; line-height: 1; color: #FF5F1F; }

    /* ── Score flash ── */
    #score-flash {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 20; opacity: 0; transition: opacity .12s;
    }
    #score-flash.show { opacity: 1; }
    #score-flash span { font-size: 72px; font-weight: 900; color: #FF5F1F; text-shadow: 0 0 15px #FF5F1F; }

    /* ── Shoot hint ── */
    #hint {
      position: absolute; left: 0; right: 0; top: 60%; transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      pointer-events: none; z-index: 9;
    }
    #hint p { color: #fff; font-size: 24px; font-weight: 900; text-transform: uppercase; font-style: italic; text-shadow: 0 2px 10px #000; }

    /* ── Email overlay ── */
    #email-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center; padding: 24px;
    }
    #email-overlay.show { display: flex; }
    .email-card {
      width: 100%; max-width: 340px;
      background: #111; border: 2px solid #FF5F1F;
      padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px;
    }
    .email-card h2 { color: #FF5F1F; text-transform: uppercase; }
    .email-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; }
    .start-btn { width: 100%; padding: 14px; background: #FF5F1F; color: #fff; font-weight: 900; border: none; cursor: pointer; }

    /* ── Result screens ── */
    .result-screen {
      position: fixed; inset: 0; z-index: 100; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px; text-align: center;
    }
    .result-screen h1 { font-size: 48px; color: #FF5F1F; margin-bottom: 20px; }
    .cta-btn { padding: 15px 40px; background: #FF5F1F; color: #fff; border: none; font-weight: 900; margin-top: 20px; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
'use strict';

const CFG = {
  timerSec: 42,
  winScore: 10,
  ballR: 58,
  rimHW: 92,
  hoopRimYFrac: 0.635,
  hoopRimWFrac: 0.395,
  cooldownMs: 86400000
};

const EJ = { svc: 'service_mvh5n2o', tpl: 'template_v9adm4b', pub: 'rah1sIloUvqBRtIVx' };
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

const store = {
  getEmail: () => sessionStorage.getItem('sxc_email'),
  saveEmail: (e) => sessionStorage.setItem('sxc_email', e),
  getCooldown: () => {
    const raw = localStorage.getItem('sxc_win');
    if (!raw) return false;
    const { timestamp } = JSON.parse(raw);
    return (Date.now() - timestamp) < CFG.cooldownMs;
  },
  recordWin: () => localStorage.setItem('sxc_win', JSON.stringify({ timestamp: Date.now() }))
};

let APP = { screen: 'game', score: 0, timeLeft: CFG.timerSec, email: null };

/* ── HELPER: IMAGE LOADER ── */
function loadImg(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

/* ── GAME ENGINE ── */
async function mountGame(host) {
  const W = host.offsetWidth, H = host.offsetHeight;
  const rimX = W / 2, rimY = H * 0.42;
  const spawnX = W / 2, spawnY = H - CFG.ballR - 20;

  const [ballImg, hoopImg, stadiumImg] = await Promise.all([
    loadImg('./ball.png'), loadImg('./hoop.png'), loadImg('./stadium.png')
  ]);

  host.innerHTML = `
    <img src="./stadium.png" id="stadium-bg">
    <div id="court-floor"><div id="court-floor-img"></div><div id="floor-fade-near"></div></div>
    <canvas id="game-cvs" width="${W}" height="${H}" style="position:absolute; inset:0; z-index:5;"></canvas>
    <div id="hud">
      <div class="brand-bar"><span>PROJECT SXC — MASTER V7</span></div>
      <div class="stat-row">
        <div class="stat-card"><span>SCORE</span><span id="score-val">0</span></div>
        <div class="stat-card"><span>TIME</span><span id="timer-val">0:42</span></div>
      </div>
    </div>
    <div id="hint"><p>SWIPE UP TO SHOOT</p></div>
    <div id="score-flash"><span>+2</span></div>
    <div id="email-overlay">
      <div class="email-card">
        <h2>Enter to Play</h2>
        <input type="email" id="email-inp" class="email-input" placeholder="you@example.com">
        <button id="start-btn" class="start-btn">START GAME</button>
      </div>
    </div>
  `;

  const ctx = document.getElementById('game-cvs').getContext('2d');
  const engine = Matter.Engine.create(), runner = Matter.Runner.create();
  
  // Physics Bodies
  let ball = Matter.Bodies.circle(spawnX, spawnY, CFG.ballR, { restitution: 0.8, friction: 0.05, label: 'ball' });
  const ground = Matter.Bodies.rectangle(W/2, H+50, W*2, 100, { isStatic: true });
  const lRim = Matter.Bodies.circle(rimX - CFG.rimHW, rimY, 5, { isStatic: true, label: 'rim' });
  const rRim = Matter.Bodies.circle(rimX + CFG.rimHW, rimY, 5, { isStatic: true, label: 'rim' });
  const sensor = Matter.Bodies.rectangle(rimX, rimY + 40, CFG.rimHW, 10, { isStatic: true, isSensor: true, label: 'goal' });

  Matter.Body.setStatic(ball, true);
  Matter.World.add(engine.world, [ball, ground, lRim, rRim, sensor]);

  let isDrag = false, ballInPlay = false, ptrStart = null, gameStarted = false, timerInterval = null;

  function resetBall() {
    ballInPlay = false;
    Matter.Body.setStatic(ball, true);
    Matter.Body.setPosition(ball, { x: spawnX, y: spawnY });
    Matter.Body.setVelocity(ball, { x: 0, y: 0 });
    Matter.Body.setAngularVelocity(ball, 0);
  }

  // Input Handling
  host.addEventListener('pointerdown', (e) => {
    if (ballInPlay || document.getElementById('email-overlay').classList.contains('show')) return;
    isDrag = true;
    ptrStart = { x: e.clientX, y: e.clientY };
  });

  host.addEventListener('pointermove', (e) => {
    if (!isDrag) return;
    Matter.Body.setPosition(ball, { x: e.clientX, y: spawnY });
  });

  host.addEventListener('pointerup', (e) => {
    if (!isDrag) return;
    isDrag = false;
    const dy = e.clientY - ptrStart.y;
    const dx = e.clientX - ptrStart.x;

    // THE V7 UNLOCKED TRIGGER
    if (dy < -15) {
      if (!gameStarted) startTimer();
      document.getElementById('hint').style.display = 'none';
      
      Matter.Body.setStatic(ball, false);
      ballInPlay = true;

      // POWER MATH (Based on Distance)
      const power = Math.min(1.2, Math.abs(dy) / 300);
      const vy = -7 - (power * 9);
      const vx = (dx * 0.03) + (rimX - ball.position.x) * 0.015;

      Matter.Body.setVelocity(ball, { x: vx, y: vy });
      Matter.Body.setAngularVelocity(ball, vx * 0.1);
      setTimeout(resetBall, 2500);
    } else {
      resetBall();
    }
  });

  // Goal Detection
  Matter.Events.on(engine, 'collisionStart', (ev) => {
    ev.pairs.forEach(p => {
      const labels = [p.bodyA.label, p.bodyB.label];
      if (labels.includes('ball') && labels.includes('goal') && ball.velocity.y > 0) {
        APP.score += 2;
        document.getElementById('score-val').textContent = APP.score;
        document.getElementById('score-flash').classList.add('show');
        setTimeout(() => document.getElementById('score-flash').classList.remove('show'), 500);
        
        if (APP.score >= CFG.winScore && !store.getCooldown()) {
          endGame(true);
        }
      }
    });
  });

  function startTimer() {
    gameStarted = true;
    timerInterval = setInterval(() => {
      APP.timeLeft--;
      document.getElementById('timer-val').textContent = `0:${APP.timeLeft < 10 ? '0' : ''}${APP.timeLeft}`;
      if (APP.timeLeft <= 0) endGame(false);
    }, 1000);
  }

  function endGame(win) {
    clearInterval(timerInterval);
    if (win) {
      store.recordWin();
      emailjs.send(EJ.svc, EJ.tpl, { to_email: APP.email, score: APP.score }, EJ.pub);
    }
    APP.screen = win ? 'win' : 'loss';
    renderRoot();
  }

  // Overlay Logic
  if (!store.getEmail()) {
    document.getElementById('email-overlay').classList.add('show');
  } else {
    APP.email = store.getEmail();
  }

  document.getElementById('start-btn').onclick = () => {
    const val = document.getElementById('email-inp').value;
    if (EMAIL_RE.test(val)) {
      APP.email = val;
      store.saveEmail(val);
      document.getElementById('email-overlay').classList.remove('show');
    }
  };

  // Rendering Loop
  function frame() {
    ctx.clearRect(0, 0, W, H);
    
    // Draw Hoop
    if (hoopImg) {
      const hScale = (CFG.rimHW * 2) / (hoopImg.naturalWidth * CFG.hoopRimWFrac);
      const hW = hoopImg.naturalWidth * hScale;
      const hH = hoopImg.naturalHeight * hScale;
      ctx.drawImage(hoopImg, rimX - hW / 2, rimY - (hH * CFG.hoopRimYFrac), hW, hH);
    }

    // Draw Ball
    const { x, y } = ball.position;
    if (isFinite(x) && isFinite(y)) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(ball.angle);
      if (ballImg) ctx.drawImage(ballImg, -CFG.ballR, -CFG.ballR, CFG.ballR * 2, CFG.ballR * 2);
      ctx.restore();
    }

    if (y > H + 100 || x < -100 || x > W + 100) resetBall();

    requestAnimationFrame(frame);
  }

  Matter.Runner.run(runner, engine);
  frame();
}

function renderRoot() {
  const root = document.getElementById('root');
  if (APP.screen === 'game') {
    mountGame(root);
  } else {
    root.innerHTML = `
      <div class="result-screen">
        <h1>${APP.screen === 'win' ? 'CHAMPION!' : 'GAME OVER'}</h1>
        <p>Final Score: ${APP.score}</p>
        <button class="cta-btn" onclick="location.reload()">PLAY AGAIN</button>
      </div>
    `;
  }
}

renderRoot();
</script>
</body>
</html>
